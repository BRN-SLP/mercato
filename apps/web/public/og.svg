<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0e2233"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Faint grid -->
  <g opacity="0.10" stroke="#22d3ee" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Barcode panel -->
  <g transform="translate(820, 150)">
    <rect width="280" height="330" rx="6" fill="#0b1220" stroke="#22d3ee" stroke-opacity="0.25"/>
    <g fill="#22d3ee">
      <rect x="20" y="40" width="14" height="250"/>
      <rect x="42" y="40" width="8"  height="250"/>
      <rect x="56" y="40" width="20" height="250"/>
      <rect x="82" y="40" width="6"  height="250"/>
      <rect x="96" y="40" width="14" height="250"/>
      <rect x="118" y="40" width="20" height="250"/>
      <rect x="146" y="40" width="8"  height="250"/>
      <rect x="162" y="40" width="14" height="250"/>
      <rect x="184" y="40" width="22" height="250"/>
      <rect x="212" y="40" width="8"  height="250"/>
      <rect x="226" y="40" width="14" height="250"/>
      <rect x="246" y="40" width="20" height="250"/>
    </g>
    <!-- amber scan beam -->
    <rect x="10" y="160" width="260" height="6" fill="#fbbf24"/>
  </g>

  <!-- Text block -->
  <text x="80" y="240" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="800" fill="#ffffff" letter-spacing="-2">BeiBei</text>
  <text x="80" y="306" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500" fill="#94a3b8">Crowdsourced prices on Celo</text>

  <text x="80" y="430" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="500" fill="#22d3ee" letter-spacing="3">SCAN · VERIFY · EARN</text>

  <!-- Built on Celo badge -->
  <rect x="80" y="478" width="180" height="44" rx="4" fill="#0b1220" stroke="#22d3ee" stroke-opacity="0.4"/>
  <text x="170" y="507" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#22d3ee" text-anchor="middle">BUILT ON CELO</text>
</svg>
